apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: {{ .Release.Namespace }}
  name: {{ include "sftpgo.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sftpgo.labels" . | nindent 4 }}
    {{- if .Values.deploymentLabels }}
    {{ toYaml .Values.deploymentLabels | nindent 4 }}
    {{- end }}
  {{- with .Values.deploymentAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  revisionHistoryLimit: {{ .Values.revisionHistoryLimit }}
  {{- with .Values.deploymentStrategy }}
  strategy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "sftpgo.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
      {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "sftpgo.selectorLabels" . | nindent 8 }}
        {{- if .Values.podLabels }}
        {{ toYaml .Values.podLabels | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "sftpgo.serviceAccountName" . }}
      hostNetwork: {{ .Values.hostNetwork }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- if not (quote .Values.podTerminationGracePeriodSeconds | empty) }}
      terminationGracePeriodSeconds: {{ .Values.podTerminationGracePeriodSeconds }}
      {{- end }}
      {{- with .Values.initContainers }}
      initContainers:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if ge (int .Values.terminationGracePeriodSeconds) 0 }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          lifecycle:
            {{- toYaml .Values.lifecycle | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default (printf "v%s" .Chart.AppVersion) }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
          {{- if .Values.portableMode.enabled }}
            - sftpgo
            - portable
            {{- if .Values.sftpd.enabled }}
            - --sftpd-port={{ .Values.sftpd.port }}
            {{- else }}
            - --sftpd-port=-1
            {{- end }}
            {{- if .Values.ftpd.enabled }}
            - --ftpd-port={{ .Values.ftpd.port }}
            {{- else }}
            - --ftpd-port=-1
            {{- end }}
            {{- if .Values.httpd.enabled }}
            - --httpd-port={{ .Values.httpd.port }}
            {{- else }}
            - --httpd-port=-1
            {{- end }}
            {{- if .Values.webdavd.enabled }}
            - --webdav-port={{ .Values.webdavd.port }}
            {{- else }}
            - --webdav-port=-1
            {{- end }}
            {{- range $key, $value := .Values.portableMode.options }}
            - --{{ $key }}={{ $value }}
            {{- end }}
          {{- else }}
            - sftpgo
            - serve
          {{- end }}
          {{- range .Values.command.extraArgs }}
            - {{ . }}
          {{- end }}
          env:
            {{- if .Values.sftpd.enabled }}
            - name: SFTPGO_SFTPD__BINDINGS__0__PORT
              value: "{{ .Values.sftpd.port }}"
            {{- else }}
            - name: SFTPGO_SFTPD__BINDINGS__0__PORT
              value: "0"
            {{- end }}
            {{- if .Values.ftpd.enabled }}
            - name: SFTPGO_FTPD__BINDINGS__0__PORT
              value: "{{ .Values.ftpd.port }}"
            - name: SFTPGO_FTPD__PASSIVE_PORT_RANGE__START
              value: "{{ .Values.service.ports.ftp.passiveRange.start }}"
            - name: SFTPGO_FTPD__PASSIVE_PORT_RANGE__END
              value: "{{ .Values.service.ports.ftp.passiveRange.end }}"
            {{- end }}
            {{- if .Values.webdavd.enabled }}
            - name: SFTPGO_WEBDAVD__BINDINGS__0__PORT
              value: "{{ .Values.webdavd.port }}"
            {{- end }}
            {{- if .Values.httpd.enabled }}
            - name: SFTPGO_HTTPD__BINDINGS__0__PORT
              value: "{{ .Values.httpd.port }}"
            {{- else }}
            - name: SFTPGO_HTTPD__BINDINGS__0__PORT
              value: "0"
            {{- end }}
            - name: SFTPGO_TELEMETRY__BIND_PORT
              value: "10000"
            - name: SFTPGO_TELEMETRY__BIND_ADDRESS
              value: ""
            {{- with .Values.envVars }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          {{- with .Values.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            {{- if .Values.sftpd.enabled }}
            - name: sftp
              containerPort: {{ .Values.sftpd.port }}
              protocol: TCP
            {{- end }}
            {{- if .Values.ftpd.enabled }}
            - name: ftp
              containerPort: {{ .Values.ftpd.port }}
              protocol: TCP
            {{- end }}
            {{- if .Values.webdavd.enabled }}
            - name: webdav
              containerPort: {{ .Values.webdavd.port }}
              protocol: TCP
            {{- end }}
            {{- if .Values.httpd.enabled }}
            - name: http
              containerPort: {{ .Values.httpd.port }}
              protocol: TCP
            {{- end }}
            - name: telemetry
              containerPort: 10000
              protocol: TCP
          startupProbe:
            httpGet:
              path: /healthz
              port: telemetry
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
            httpGet:
              path: /healthz
              port: telemetry
          readinessProbe:
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
            httpGet:
              path: /healthz
              port: telemetry
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/sftpgo/sftpgo.json
              subPath: sftpgo.json
              readOnly: true
          {{- if .Values.persistence.enabled }}
            - mountPath: /var/lib/sftpgo
              name: sftpgo-volume
          {{- end }}
          {{- with .Values.volumeMounts }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "sftpgo.fullname" . }}
      {{- if .Values.persistence.enabled }}
        - name: sftpgo-volume
          persistentVolumeClaim:
            claimName: {{ include "sftpgo.fullname" . }}
      {{- end }}
      {{- with .Values.volumes }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podPriorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.topologySpreadConstraints.enabled }}
      topologySpreadConstraints:
        - labelSelector:
            matchLabels:
              {{- include "sftpgo.selectorLabels" . | nindent 14 }}
          maxSkew: {{ .Values.topologySpreadConstraints.maxSkew }}
          topologyKey: {{ .Values.topologySpreadConstraints.topologyKey }}
          whenUnsatisfiable: {{ .Values.topologySpreadConstraints.whenUnsatisfiable }}
      {{- end }}
